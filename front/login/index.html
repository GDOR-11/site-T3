<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Entrar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="main-container">
        <div class="register-card">
            <h1>Login</h1>
            <p class="subtitle">Introduza os seus dados para acessar sua conta.</p>

            <form method="POST" action="/api/auth/login">
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" placeholder="Seu nome de usuário" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Sua senha" required>
                </div>

                <button type="submit" class="btn-register">Fazer login</button>
            </form>
        </div>
    </main>

</body>
</html>
