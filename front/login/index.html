<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turma 3 | ITA</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/basic_style.css">
    <link rel="stylesheet" href="/login/style.css">
    <script src="/header_script.js"></script>
</head>

<body>
    <header>
        <a href="http://www.ita.br" class="logo">
            <img src="/images/logoita.svg" alt="Logo ITA">
        </a>
        <nav>
            <ul>
                <li><a href="/">Início</a></li>
                <li><a href="/sobre_a_turma">Sobre a turma</a></li>
                <li><a href="">Página 2</a></li>
                <li><a href="">Página 3</a></li>

                <li class="dropdown">
                    <p class="dropbtn">Conta</p>
                    <div class="dropdown-content">
                        <div class="profile-container">
                            <p id="header-username">Não conectado</p>
                        </div>
                        <a href="/login">Entrar</a>
                        <a href="/register">Criar conta</a>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <main class="main-container">
        <div class="register-card">
            <h1 id="login-title">Login</h1>
            <p class="subtitle">Introduza os seus dados para acessar sua conta.</p>

            <form method="POST" action="/api/auth/login">
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" placeholder="Seu nome de usuário" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Sua senha" required>
                </div>

                <button type="submit" class="btn-register">Fazer login</button>
            </form>
        </div>
    </main>

    <footer>
        <a href="https://www.itajr.com.br" class="logo">
            <img src="/images/logo_itajr.svg" alt="Logo ITA">
        </a>
        <p style="font-size: 12px; opacity: 0.7;">© 2026 Instituto Tecnológico de Aeronáutica - São José dos Campos, SP
        </p>
        <nav>
            <ul>
                <li><a href="/perguntas_frequentes" style="font-size: 11px;">Perguntas Frequentes</a></li>
                <li><a href="/contato" style="font-size: 11px;">Contato</a></li>
            </ul>
        </nav>
    </footer>

</body>

</html>
