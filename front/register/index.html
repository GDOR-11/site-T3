<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | Nova Conta</title>
    <link rel="stylesheet" href="/register/style.css">
</head>
<body>

    <main class="register-container">
        <div class="register-card">
            <h1>Criar nova conta</h1>
            <p>Preencha os dados abaixo para se registar.</p>

            <form method="post" action="/api/auth/register">
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" placeholder="Escolha um nome de usuário" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Crie uma senha forte" required>
                </div>

                <button type="submit" class="btn-submit">Criar conta</button>
            </form>

            <div class="footer-links">
                <span>Já tem uma conta? <a href="../login/index.html">Faça login</a></span>
            </div>
        </div>
    </main>

</body>
</html>
