<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | Nova Conta</title>
    <link rel="stylesheet" href="/basic_style.css">
    <script type="module" src="/header_script.js"></script>
    <link rel="stylesheet" href="/register/style.css">
</head>
<body>
    <header>
        <a id="header-logo-link" href="http://www.ita.br">
            <img id="header-logo" src="/images/logoita.svg" />
        </a>
        <h1 id="header-title">Turma 30.3</h1>
        <div class="auth-section" id="unauthenticated-auth-section">
            <a class="auth-link" href="/login">Entrar</a>
            <a class="auth-link" href="/register">Criar conta</a>
        </div>
        <div class="auth-section" id="authenticated-auth-section" style="display: none;">
            <p id="header-username"></p>
            <a class="auth-link" href="/login">Trocar de usuário</a>
        </div>
    </header>
    <nav id="navbar">
        <ul id="navbar-list">
            <li><a class="navbar-link" href="/pagina1">Página 1</a></li>
            <li><a class="navbar-link" href="/pagina2">Página 2</a></li>
            <li><a class="navbar-link" href="/pagina3">Página 3</a></li>
            <li><a class="navbar-link" href="/pagina4">Página 4</a></li>
            <li><a class="navbar-link" href="/pagina5">Página 5</a></li>
        </ul>
    </nav>
    <main class="register-container">
        <div class="register-card">
            <h1 id="register-title">Criar nova conta</h1>
            <p id="register-description">Preencha os dados abaixo para se registar.</p>

            <form method="post" action="/api/auth/register">
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" placeholder="Escolha um nome de usuário" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Crie uma senha forte" required>
                </div>

                <button type="submit" class="btn-submit">Criar conta</button>
            </form>

            <div class="footer-links">
                <span>Já tem uma conta? <a href="/login">Faça login</a></span>
            </div>
        </div>
    </main>
    <footer>
        <a id="footer-logo-link" href="https://www.itajr.com.br">
            <img id="footer-logo" src="/images/logo_itajr.svg" />
        </a>
    </footer>
</body>
</html>
